<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#667eea,#764ba2);
    }

    .card{
      width:350px;
      background:#fff;
      padding:35px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      text-align:center;
    }

    .card h2{
      margin-bottom:10px;
      color:#333;
    }

    .card p{
      color:#777;
      font-size:14px;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#f1f1f1;
      margin-bottom:15px;
      font-size:15px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#667eea;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      background:#5a67d8;
    }

    #message{
      margin-top:15px;
      font-size:14px;
      color:green;
    }

    .logo{
      font-size:40px;
      margin-bottom:15px;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="logo">🔐</div>

    <h2>Create New Password</h2>

    <p>Enter your new password below</p>

    <input
      type="password"
      id="password"
      placeholder="New Password"
    >

    <button id="resetBtn">
      Reset Password
    </button>

    <div id="message"></div>

  </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  confirmPasswordReset
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDwx-GoLV3-T5_zEURlqUb1LXa48gbqhM8",
  authDomain: "live-voting-b236f.firebaseapp.com"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const params =
  new URLSearchParams(window.location.search);

const oobCode =
  params.get("oobCode");

document
.getElementById("resetBtn")
.onclick = async () => {

  const password =
    document.getElementById("password").value;

  const message =
    document.getElementById("message");

  if(password.length < 6){
    message.style.color = "red";
    message.innerHTML =
      "Password must be at least 6 characters";
    return;
  }

  try{

    await confirmPasswordReset(
      auth,
      oobCode,
      password
    );

    message.style.color = "green";

    message.innerHTML =
      "✅ Password reset successful!";

  }catch(error){

    message.style.color = "red";

    message.innerHTML =
      error.message;
  }

};

</script>

</body>
</html>
